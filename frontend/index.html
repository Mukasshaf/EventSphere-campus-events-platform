<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EventSphere - Premium Campus Events</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=1.1">
</head>

<body>

    <nav class="navbar">
        <div class="nav-container">
            <h1 class="logo">Event<span>Sphere</span></h1>
            <div class="toggle-container">
                <span id="user-label" class="active">User</span>
                <label class="switch">
                    <input type="checkbox" id="view-toggle">
                    <span class="slider round"></span>
                </label>
                <span id="admin-label">Admin</span>
            </div>
        </div>
    </nav>

    <main class="container">

        <!-- ================= USER VIEW ================= -->
        <section id="user-view" class="view-section active">
            <div class="header-section">
                <h2>Upcoming Campus Events</h2>
                <p>Discover and register for the best events happening around you.</p>
            </div>

            <div id="user-events-list" class="grid-container">
                <!-- User event cards go here -->
            </div>

            <div class="modal" id="register-modal">
                <div class="modal-content">
                    <span class="close-btn" onclick="closeRegisterModal()">&times;</span>
                    <h3>Register for <span id="reg-event-title-display"></span></h3>
                    <form id="register-form">
                        <input type="hidden" id="reg-event-id">
                        <div class="form-group">
                            <label>Full Name</label>
                            <input type="text" id="reg-name" placeholder="John Doe" required>
                        </div>
                        <div class="form-group">
                            <label>Email Address</label>
                            <input type="email" id="reg-email" placeholder="john@university.edu" required>
                        </div>
                        <button type="submit" class="btn primary-btn btn-full">Confirm Registration</button>
                    </form>
                </div>
            </div>
        </section>

        <!-- ================= ADMIN VIEW ================= -->
        <section id="admin-view" class="view-section">
            <div class="header-section">
                <h2>Admin Dashboard</h2>
                <button class="btn primary-btn" onclick="openCreateModal()">+ Create New Event</button>
            </div>

            <div class="admin-panel">
                <div id="admin-events-list" class="admin-list">
                    <!-- Admin list rows go here -->
                </div>
            </div>

            <!-- Create/Edit Modal -->
            <div class="modal" id="edit-modal">
                <div class="modal-content">
                    <span class="close-btn" onclick="closeEditModal()">&times;</span>
                    <h3 id="edit-modal-title">Create Event</h3>
                    <form id="edit-event-form">
                        <input type="hidden" id="edit-event-id">
                        <div class="form-group">
                            <label>Event Title</label>
                            <input type="text" id="edit-title" required>
                        </div>
                        <div class="form-group">
                            <label>Event Date</label>
                            <input type="date" id="edit-date" required>
                        </div>
                        <div class="form-group">
                            <label>Description</label>
                            <textarea id="edit-desc" rows="4" required></textarea>
                        </div>
                        <button type="submit" class="btn primary-btn btn-full" id="edit-submit-btn">Save Event</button>
                    </form>
                </div>
            </div>

            <!-- View Registrations Modal -->
            <div class="modal" id="regs-modal">
                <div class="modal-content large-modal">
                    <span class="close-btn" onclick="closeRegsModal()">&times;</span>
                    <h3>Registrations: <span id="regs-event-title"></span></h3>
                    <div class="regs-table-container">
                        <table class="regs-table">
                            <thead>
                                <tr>
                                    <th>Name</th>
                                    <th>Email</th>
                                </tr>
                            </thead>
                            <tbody id="regs-tbody">
                                <!-- Regs go here -->
                            </tbody>
                        </table>
                        <p id="no-regs-msg" style="display: none; text-align: center; padding: 20px;">No registrations
                            yet.</p>
                    </div>
                </div>
            </div>

        </section>

    </main>

    <script src="app.js"></script>
</body>

</html>
