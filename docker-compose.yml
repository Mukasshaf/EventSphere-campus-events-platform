version: '3.8'

services:
  backend:
    build:
      context: ./backend
    environment:
      - PORT=8000
      - APP_ENV=production
    expose:
      - "8000"
    networks:
      - app_network
    restart: always

  frontend:
    build:
      context: ./frontend
    expose:
      - "80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    networks:
      - app_network
    restart: always

  reverse-proxy:
    image: nginx:alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - backend
      - frontend
    networks:
      - app_network
    restart: always

networks:
  app_network:
    driver: bridge
